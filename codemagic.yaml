workflows:
  wf:
    environment:
      xcode: 13.3
      vars:
        v: value
      groups:
        - g1
        - g2
        - s
    scripts:
      - printenv
      - app-store-connect get-profile kana || true
    artifacts:
      - /tmp/xcodebuild_logs/*.log
  empty:
    name: Empty
    environment:
      xcode: 13.3
    scripts:
      - echo "empty"
